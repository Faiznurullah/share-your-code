<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pemrograman Web - 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.35/dist/codicon.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="viewer-shell" x-data>
    <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
    <header class="topbar-wrap">
        <!-- Fixed navbar -->
        <nav class="navbar navbar-expand-lg topbar shadow-lg">
            <div class="container-fluid">
                <a class="navbar-brand ms-2 fw-semibold" href="#">Pemrograman Web - 2026</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </nav>
    </header>

    <main class="app-layout d-flex flex-nowrap overflow-y-hidden overflow-x-auto">
        <div id="sidebar" tabindex="-1"
            class="d-flex flex-column flex-shrink-0 p-3 viewer-sidebar offcanvas-lg offcanvas-start">
            <div class="path-caption">Live Path</div>
            <div id="pertemuan" x-text="$store.code.path" class="p-2"></div>
            <div id="explorer" class="fs-6"></div>
        </div>
        <div class="d-flex flex-column flex-shrink w-100 editor-area">
            <div id="filename" class="py-2 px-3" x-text="$store.code.activeTab"></div>
            <div id="editor" class="w-100 h-100"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script src="main.js" type="module"></script>

    
</body>

</html>
